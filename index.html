<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>笔记文件浏览器</title>
<style>
body{font-family:Arial;padding:20px;max-width:900px;margin:auto;}
a{display:block;margin:4px 0;color:#0366d6;text-decoration:none;}
a:hover{text-decoration:underline;}
#md-viewer{border:1px solid #ddd;padding:20px;margin-top:20px;}
</style>
</head>
<body>

<h1>文件浏览器</h1>
<div id="list"></div>
<div id="md-viewer"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const user = "6f6b";  // 改成你的 GitHub 用户名
const repo = "bian";        // 改成你的仓库名
const extMap = ["md","pdf","png","jpg"]; // 支持的文件类型

// 解析 URL
let path = window.location.pathname.split("/").slice(2).join("/"); 
// slice(2) 去掉 /repo/ 前缀

async function load(path="") {
  const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;
  const listDiv = document.getElementById("list");
  const mdViewer = document.getElementById("md-viewer");
  listDiv.innerHTML = "";
  mdViewer.innerHTML = "";

  try {
    const res = await fetch(apiUrl);
    if(!res.ok) throw new Error("目录不存在");
    const data = await res.json();

    // 上级目录
    if(path){
      const up = path.split("/").slice(0,-1).join("/");
      listDiv.innerHTML += `<a href="/${repo}/${up}">⬅ 返回上级</a>`;
    }

    data.forEach(item=>{
      if(item.type==="dir"){
        listDiv.innerHTML += `<a href="/${repo}/${item.path}">📁 ${item.name}</a>`;
      } else {
        listDiv.innerHTML += `<a href="/${repo}/${item.path.endsWith('.md') ? item.path.slice(0, -3) : item.path}" class="file-link">📄 ${item.name.endsWith('.md') ? item.name.slice(0, -3) : item.name}</a>`;
      }
    });

  } catch(e){
    // 目录不存在 → 可能是文件访问
    await loadFile(path);
  }
}

// 自动识别文件类型并加载
async function loadFile(path){
  const mdViewer = document.getElementById("md-viewer");
  for(const ext of extMap){
    const url = `https://raw.githubusercontent.com/${user}/${repo}/main/${path}.${ext}`;
    const res = await fetch(url);
    if(res.ok){
      if(ext==="md"){
        const text = await res.text();
        mdViewer.innerHTML = marked.parse(text);
      } else {
        window.open(url,"_blank");
      }
      return;
    }
  }
  mdViewer.innerHTML = "<p>文件不存在</p>";
}

// 初始化
load(path);

// SPA 点击拦截
document.addEventListener("click", e=>{
  if(e.target.classList.contains("file-link") || e.target.tagName==="A"){
    const href = e.target.getAttribute("href");
    if(href && href.startsWith(`/${repo}/`)){
      e.preventDefault();
      history.pushState(null,null,href);
      const newPath = href.split("/").slice(2).join("/");
      load(newPath);
    }
  }
});

// 前进后退支持
window.addEventListener("popstate", ()=>{
  const newPath = window.location.pathname.split("/").slice(2).join("/");
  load(newPath);
});
</script>

</body>
</html>
